<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentGrid 命令文档</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --text: #111827;
        --muted: #64748b;
        --line: #dfe5ee;
        --panel: #ffffff;
        --code: #0f172a;
        --link: #2563eb;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }
      article {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
      }
      h1 {
        margin-top: 0;
        font-size: 34px;
      }
      h2 {
        margin-top: 36px;
        border-top: 1px solid var(--line);
        padding-top: 24px;
      }
      p,
      li {
        line-height: 1.75;
      }
      a {
        color: var(--link);
      }
      pre {
        overflow: auto;
        background: var(--code);
        color: #e5e7eb;
        padding: 16px;
        border-radius: 8px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      p code,
      li code {
        background: #eef2f7;
        color: var(--text);
        padding: 2px 5px;
        border-radius: 4px;
      }
      blockquote {
        margin-left: 0;
        padding-left: 16px;
        border-left: 4px solid var(--line);
        color: var(--muted);
      }
      .status {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <article id="content">
        <p class="status">正在加载文档...</p>
      </article>
    </main>
    <script>
      const escapeHtml = (value) =>
        value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;');

      function inlineMarkdown(value) {
        return escapeHtml(value)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      }

      function renderMarkdown(markdown) {
        const lines = markdown.split(/\r?\n/);
        const html = [];
        let paragraph = [];
        let list = [];
        let code = [];
        let inCode = false;

        const flushParagraph = () => {
          if (!paragraph.length) return;
          html.push(`<p>${inlineMarkdown(paragraph.join(' '))}</p>`);
          paragraph = [];
        };
        const flushList = () => {
          if (!list.length) return;
          html.push(`<ul>${list.map((item) => `<li>${inlineMarkdown(item)}</li>`).join('')}</ul>`);
          list = [];
        };
        const flushCode = () => {
          if (!code.length) return;
          html.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`);
          code = [];
        };

        for (const line of lines) {
          if (line.startsWith('```')) {
            if (inCode) {
              inCode = false;
              flushCode();
            } else {
              flushParagraph();
              flushList();
              inCode = true;
            }
            continue;
          }
          if (inCode) {
            code.push(line);
            continue;
          }
          if (!line.trim()) {
            flushParagraph();
            flushList();
            continue;
          }
          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            flushList();
            const level = heading[1].length;
            html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            continue;
          }
          const bullet = line.match(/^-\s+(.+)$/);
          if (bullet) {
            flushParagraph();
            list.push(bullet[1]);
            continue;
          }
          paragraph.push(line.trim());
        }
        flushParagraph();
        flushList();
        flushCode();
        return html.join('\n');
      }

      fetch('./agentgrid-command-reference.md', { cache: 'no-store' })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then((markdown) => {
          document.getElementById('content').innerHTML = renderMarkdown(markdown);
        })
        .catch((error) => {
          document.getElementById('content').innerHTML = `<p class="status">文档加载失败：${escapeHtml(error.message)}</p>`;
        });
    </script>
  </body>
</html>
