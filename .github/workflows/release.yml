name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive: tar
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos-x86_64
            archive: tar
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos-arm64
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/agentgrid-web/package-lock.json

      - name: Build web console
        run: |
          npm --prefix apps/agentgrid-web ci
          npm --prefix apps/agentgrid-web run build

      - name: Build Rust binaries
        run: cargo build --release --target ${{ matrix.target }} -p agentgrid-hub -p agentgrid-worker-app -p agentgrid-cli -p agentgrid-mcp

      - name: Package Unix archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE="agentgrid-${VERSION}-${{ matrix.platform }}"
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p "package/${PACKAGE}/bin" dist
          cp "${BIN_DIR}/agentgrid" "package/${PACKAGE}/bin/"
          cp "${BIN_DIR}/agentgrid-hub" "package/${PACKAGE}/bin/"
          cp "${BIN_DIR}/agentgrid-worker" "package/${PACKAGE}/bin/"
          cp "${BIN_DIR}/agentgrid-mcp" "package/${PACKAGE}/bin/"
          cp README.md README.zh-CN.md LICENSE NOTICE OPEN_SOURCE.md "package/${PACKAGE}/"
          cp -R docs "package/${PACKAGE}/docs"
          cp -R examples "package/${PACKAGE}/examples"
          cp -R scripts "package/${PACKAGE}/scripts"
          cp -R apps/agentgrid-web/dist "package/${PACKAGE}/web"
          tar -C package -czf "dist/${PACKAGE}.tar.gz" "${PACKAGE}"
          shasum -a 256 "dist/${PACKAGE}.tar.gz" > "dist/${PACKAGE}.tar.gz.sha256"

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $Package = "agentgrid-$Version-${{ matrix.platform }}"
          $BinDir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force -Path "package/$Package/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "$BinDir/agentgrid.exe" "package/$Package/bin/"
          Copy-Item "$BinDir/agentgrid-hub.exe" "package/$Package/bin/"
          Copy-Item "$BinDir/agentgrid-worker.exe" "package/$Package/bin/"
          Copy-Item "$BinDir/agentgrid-mcp.exe" "package/$Package/bin/"
          Copy-Item README.md,README.zh-CN.md,LICENSE,NOTICE,OPEN_SOURCE.md "package/$Package/"
          Copy-Item docs "package/$Package/docs" -Recurse
          Copy-Item examples "package/$Package/examples" -Recurse
          Copy-Item scripts "package/$Package/scripts" -Recurse
          Copy-Item apps/agentgrid-web/dist "package/$Package/web" -Recurse
          Compress-Archive -Path "package/$Package" -DestinationPath "dist/$Package.zip" -Force
          $Hash = (Get-FileHash "dist/$Package.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$Hash  $Package.zip" | Set-Content "dist/$Package.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: dist/*
