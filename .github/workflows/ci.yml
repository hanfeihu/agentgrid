name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/agentgrid-web/package-lock.json
      - name: Rust check
        run: cargo check -p agentgrid-hub -p agentgrid-worker -p agentgrid-cli -p agentgrid-mcp
      - name: Web dependencies
        run: npm --prefix apps/agentgrid-web ci
      - name: Web build
        run: npm --prefix apps/agentgrid-web run build
      - name: Schema check
        run: node scripts/validate-agentgrid-schemas.js

