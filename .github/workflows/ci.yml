name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/agentgrid-web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Rust format
        run: cargo fmt --all -- --check
      - name: Rust check
        run: cargo check -p agentgrid-hub -p agentgrid-worker-app -p agentgrid-cli -p agentgrid-mcp
      - name: Rust tests
        run: cargo test -p agentgrid-hub -p agentgrid-worker-app -p agentgrid-scheduler
      - name: Web dependencies
        run: npm --prefix apps/agentgrid-web ci
      - name: Web build
        run: npm --prefix apps/agentgrid-web run build
      - name: Schema check
        run: node scripts/validate-agentgrid-schemas.js
      - name: Android Mobile SDK
        run: scripts/check-android-mobile-sdk.sh
      - name: Hub Worker CLI e2e
        run: scripts/e2e-hub-worker-cli.sh
