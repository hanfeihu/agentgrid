openapi: 3.1.0
info:
  title: AgentGrid Hub API
  version: 1.0.0
  summary: Machine-readable API standard for AgentGrid Hub v1.
  description: |
    AgentGrid Hub coordinates AI clients, worker nodes, tools, jobs,
    artifacts, and event streams through structured contracts.
servers:
  - url: https://hub.example.com/agentgrid/api
    description: Default AgentGrid Hub API
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Admin
  - name: Nodes
  - name: Workbenches
  - name: PortBridges
  - name: Tasks
  - name: Jobs
  - name: Artifacts
  - name: Tools
  - name: Events
paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Check Hub health.
      operationId: getHealth
      responses:
        "200":
          description: Hub health response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Log in and receive a Hub bearer token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/Error"
  /auth/register/request-code:
    post:
      tags: [Auth]
      security: []
      summary: Request an email registration code.
      operationId: requestRegistrationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Registration code accepted for delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a Hub user with an email verification code.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/Error"
  /auth/me:
    get:
      tags: [Auth]
      summary: Resolve the current Hub bearer token.
      operationId: getCurrentUser
      responses:
        "200":
          description: Current session state.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [ok, authenticated]
                properties:
                  ok:
                    const: true
                  authenticated:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
                  organization:
                    $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
  /users:
    get:
      tags: [Admin]
      summary: List Hub users.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: listUsers
      x-agentgrid-required-role: admin_or_super_admin
      responses:
        "200":
          description: Hub users.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, organization, items]
                properties:
                  ok:
                    const: true
                  organization:
                    $ref: "#/components/schemas/Organization"
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
  /users/{user_id}:
    post:
      tags: [Admin]
      summary: Update a Hub user profile, role, or status.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: updateUser
      x-agentgrid-required-role: admin_or_super_admin
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
  /settings:
    get:
      tags: [Admin]
      summary: Read Hub system settings.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: getSettings
      x-agentgrid-required-role: admin_or_super_admin
      responses:
        "200":
          description: Public settings plus safe SMTP hints.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/HubSettings"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Admin]
      summary: Update Hub system settings.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: updateSettings
      x-agentgrid-required-role: admin_or_super_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HubSettingsUpdate"
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/HubSettings"
        default:
          $ref: "#/components/responses/Error"
  /node-provisioning/plans:
    get:
      tags: [Admin]
      summary: List node provisioning plans and pending join requests.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: listNodeProvisioningPlans
      x-agentgrid-required-role: admin_or_super_admin
      responses:
        "200":
          description: Node provisioning plans.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, items]
                properties:
                  ok:
                    const: true
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NodeProvisioningPlan"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Admin]
      summary: Create a node provisioning plan and join token.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: createNodeProvisioningPlan
      x-agentgrid-required-role: admin_or_super_admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeProvisioningPlanRequest"
      responses:
        "201":
          description: Plan created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/NodeProvisioningPlan"
        default:
          $ref: "#/components/responses/Error"
  /worker/update-manifest:
    get:
      tags: [Nodes]
      security: []
      summary: Return the published Worker update manifest for a target.
      operationId: getWorkerUpdateManifest
      parameters:
        - name: worker_target
          in: query
          schema:
            type: string
            examples: [linux-x86_64, windows-x86_64, darwin-aarch64]
        - name: os
          in: query
          schema:
            type: string
        - name: arch
          in: query
          schema:
            type: string
        - name: current_sha256
          in: query
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{64}$"
        - name: glibc_version
          in: query
          schema:
            type: string
        - name: node_id
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
            default: stable
      responses:
        "200":
          description: Worker update manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerUpdateManifest"
        default:
          $ref: "#/components/responses/Error"
  /nodes:
    get:
      tags: [Nodes]
      summary: List worker nodes.
      operationId: listNodes
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, unknown]
        - name: os
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Node list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, items]
                properties:
                  ok:
                    const: true
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Node"
        default:
          $ref: "#/components/responses/Error"
  /nodes/{node_id}:
    get:
      tags: [Nodes]
      summary: Get a worker node.
      operationId: getNode
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Node details.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/Node"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Admin]
      summary: Delete a worker node record.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: deleteNode
      x-agentgrid-required-role: admin_or_super_admin
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Node deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"
  /nodes/{node_id}/config:
    post:
      tags: [Admin]
      summary: Update worker node routing and scheduling config.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: updateNodeConfig
      x-agentgrid-required-role: admin_or_super_admin
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeConfigRequest"
      responses:
        "200":
          description: Node config updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/Node"
        default:
          $ref: "#/components/responses/Error"
  /nodes/{node_id}/approve:
    post:
      tags: [Admin]
      summary: Approve a pending node join.
      description: Requires a bearer session whose user role is `admin` or `super_admin`.
      operationId: approveNode
      x-agentgrid-required-role: admin_or_super_admin
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [actor]
              properties:
                actor:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Node approved.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/Node"
        default:
          $ref: "#/components/responses/Error"
  /workbenches:
    get:
      tags: [Workbenches]
      summary: List physical computers/workbenches.
      operationId: listWorkbenches
      responses:
        "200":
          description: Workbench list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, api_version, kind, items]
                properties:
                  ok:
                    const: true
                  api_version:
                    const: agentgrid.workbench/v1
                  kind:
                    const: WorkbenchList
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workbench"
        default:
          $ref: "#/components/responses/Error"
  /workbenches/{workbench_id}:
    get:
      tags: [Workbenches]
      summary: Get one physical computer/workbench.
      operationId: getWorkbench
      parameters:
        - $ref: "#/components/parameters/WorkbenchId"
      responses:
        "200":
          description: Workbench details.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, api_version, kind, item]
                properties:
                  ok:
                    const: true
                  api_version:
                    const: agentgrid.workbench/v1
                  kind:
                    const: WorkbenchDetail
                  item:
                    $ref: "#/components/schemas/Workbench"
        default:
          $ref: "#/components/responses/Error"
  /workbenches/{workbench_id}/timeline:
    get:
      tags: [Workbenches]
      summary: Read the operation timeline for one physical computer/workbench.
      operationId: getWorkbenchTimeline
      parameters:
        - $ref: "#/components/parameters/WorkbenchId"
      responses:
        "200":
          description: Workbench timeline.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, api_version, kind, item]
                properties:
                  ok:
                    const: true
                  api_version:
                    const: agentgrid.workbench-timeline/v1
                  kind:
                    const: WorkbenchTimeline
                  item:
                    type: object
                    additionalProperties: true
        default:
          $ref: "#/components/responses/Error"
  /workbenches/{workbench_id}/actions:
    post:
      tags: [Workbenches]
      summary: Operate a physical computer/workbench through a structured action.
      description: |
        This is the standard product and AI-client entry point. The caller
        provides a Workbench, an action, and a structured payload. Hub chooses
        the correct node channel such as worker, desktop, bridge, service, or
        device.
      operationId: createWorkbenchAction
      parameters:
        - $ref: "#/components/parameters/WorkbenchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkbenchActionRequest"
      responses:
        "201":
          description: Workbench action submitted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, api_version, kind, item]
                properties:
                  ok:
                    const: true
                  api_version:
                    const: agentgrid.workbench-action/v1
                  kind:
                    const: WorkbenchActionSubmission
                  item:
                    $ref: "#/components/schemas/WorkbenchAction"
        default:
          $ref: "#/components/responses/Error"
  /port-bridges:
    get:
      tags: [PortBridges]
      security: []
      summary: List active node port bridge sessions.
      description: |
        Port bridges are Hub-orchestrated TCP tunnels between two Worker nodes.
        The source Worker binds a local loopback port; the target Worker connects
        to a target host and port from its own network context.
      operationId: listPortBridges
      responses:
        "200":
          description: Port bridge sessions.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, items]
                properties:
                  ok:
                    const: true
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PortBridgeSession"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [PortBridges]
      security: []
      summary: Create a node port bridge session.
      description: |
        v1 supports TCP only. The source bind host must be `127.0.0.1`; the
        target host must be loopback, localhost, or a private IP address.
      operationId: createPortBridge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortBridgeRequest"
      responses:
        "200":
          description: Port bridge session created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/PortBridgeSession"
        default:
          $ref: "#/components/responses/Error"
  /port-bridges/{port_bridge_id}:
    get:
      tags: [PortBridges]
      security: []
      summary: Get a node port bridge session.
      operationId: getPortBridge
      parameters:
        - $ref: "#/components/parameters/PortBridgeId"
      responses:
        "200":
          description: Port bridge session.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/PortBridgeSession"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [PortBridges]
      security: []
      summary: Close a node port bridge session.
      operationId: closePortBridge
      parameters:
        - $ref: "#/components/parameters/PortBridgeId"
      responses:
        "200":
          description: Port bridge session closed.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/PortBridgeSession"
        default:
          $ref: "#/components/responses/Error"
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks.
      operationId: listTasks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: project_id
          in: query
          schema:
            type: string
        - name: owner
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/TaskState"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/Priority"
      responses:
        "200":
          description: Task list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, items]
                properties:
                  ok:
                    const: true
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentTask"
                  next_cursor:
                    type: [string, "null"]
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Tasks]
      summary: Create a task.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "200":
          description: Task created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/AgentTask"
                  message_id:
                    type: [string, "null"]
        default:
          $ref: "#/components/responses/Error"
  /tasks/{task_id}:
    get:
      tags: [Tasks]
      summary: Get a task.
      operationId: getTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task details.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/AgentTask"
        default:
          $ref: "#/components/responses/Error"
  /tasks/{task_id}/schedule-preview:
    get:
      tags: [Tasks]
      summary: Preview scheduling decisions for a task.
      operationId: previewTaskSchedule
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Scheduler preview.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/PlacementContract"
        default:
          $ref: "#/components/responses/Error"
  /worker/tasks/{task_id}/complete:
    post:
      tags: [Tasks]
      summary: Complete a leased worker task.
      operationId: completeWorkerTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerTaskCompletionRequest"
      responses:
        "200":
          description: Task completion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"
  /worker/tasks/{task_id}/fail:
    post:
      tags: [Tasks]
      summary: Fail a leased worker task.
      operationId: failWorkerTask
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerTaskFailureRequest"
      responses:
        "200":
          description: Task failure accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"
  /worker/tasks/{task_id}/renew:
    post:
      tags: [Tasks]
      summary: Renew a running task lease.
      operationId: renewWorkerTaskLease
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [node_id, lease_seconds]
              properties:
                node_id:
                  type: string
                  minLength: 1
                lease_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
      responses:
        "200":
          description: Lease renewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"
  /jobs:
    get:
      tags: [Jobs]
      summary: List jobs.
      operationId: listJobs
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/JobState"
      responses:
        "200":
          description: Job list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, items]
                properties:
                  ok:
                    const: true
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                  next_cursor:
                    type: [string, "null"]
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Jobs]
      summary: Create a recoverable Job Runtime job.
      operationId: createJob
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Job created or reused.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  reused:
                    type: boolean
                    default: false
                  item:
                    $ref: "#/components/schemas/Job"
        default:
          $ref: "#/components/responses/Error"
  /jobs/plan:
    post:
      tags: [Jobs]
      summary: Plan a job without creating it.
      operationId: planJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Job plan.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, item]
                properties:
                  ok:
                    const: true
                  item:
                    $ref: "#/components/schemas/JobPlan"
        default:
          $ref: "#/components/responses/Error"
  /jobs/reliability:
    get:
      tags: [Jobs]
      summary: Read Job Runtime reliability contract and counters.
      operationId: getJobReliability
      responses:
        "200":
