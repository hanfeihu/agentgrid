          type: integer
          minimum: 0
        max_concurrent_jobs:
          type: integer
          minimum: 0
    NodeProvisioningPlan:
      type: object
      additionalProperties: true
      required: [metadata, spec, status]
      properties:
        metadata:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            node_id:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        spec:
          type: object
          additionalProperties: true
          properties:
            node_name:
              type: string
            os:
              type: string
            arch:
              type: string
            hub_url:
              type: string
            join_token:
              type: [string, "null"]
