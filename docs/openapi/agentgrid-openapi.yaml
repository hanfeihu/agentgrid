    HubSettingsUpdate:
      type: object
      additionalProperties: false
      properties:
        hub_public_url:
          type: string
        registration_enabled:
          type: boolean
        smtp:
          type: object
          additionalProperties: true
          properties:
            host:
              type: string
            port:
              type: integer
            username:
              type: string
            password:
              type: string
              description: Stored by the private Hub deployment; never returned by public settings.
            from:
              type: string
    LoginRequest:
      type: object
      additionalProperties: false
