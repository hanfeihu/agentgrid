            join_token_hint:
              type: string
            bound_machine_fingerprint:
              type: [string, "null"]
        status:
          type: object
          additionalProperties: true
          properties:
            state:
              type: string
              enum: [planned, pending, bound, failed, cancelled]
    CreatePortBridgeRequest:
      type: object
      additionalProperties: false
      required: [source_node_id, target_node_id, target_port]
      properties:
        source_node_id:
          type: string
          minLength: 1
          description: Worker node that exposes the loopback source port.
        target_node_id:
          type: string
          minLength: 1
          description: Worker node that connects to the target host and port.
        source_bind_host:
          type: string
          default: 127.0.0.1
          enum: [127.0.0.1]
        source_bind_port:
          type: integer
          minimum: 0
          maximum: 65535
          default: 0
          description: Use 0 to let the source Worker choose an available local port.
        target_host:
          type: string
          default: 127.0.0.1
          description: Must be loopback, localhost, or a private IP address in v1.
        target_port:
          type: integer
          minimum: 1
          maximum: 65535
        protocol:
          type: string
          enum: [tcp]
          default: tcp
        ttl_seconds:
          type: integer
          minimum: 30
          maximum: 86400
          default: 1800
        purpose:
          type: [string, "null"]
        created_by:
          type: string
          default: agentgrid-cli
    PortBridgeSession:
      type: object
      additionalProperties: false
      required: [api_version, kind, metadata, spec, status]
      properties:
        api_version:
          const: agentgrid.bridge/v1
        kind:
          const: PortBridgeSession
        metadata:
          type: object
          additionalProperties: false
          required: [id, created_at, expires_at, created_by]
          properties:
            id:
              type: string
              pattern: "^pbridge_[A-Za-z0-9_\\-]+$"
            created_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            created_by:
              type: string
        spec:
          type: object
          additionalProperties: false
          required:
            - source_node_id
            - target_node_id
            - source_bind_host
            - source_bind_port
            - target_host
            - target_port
            - protocol
            - purpose
          properties:
            source_node_id:
              type: string
            target_node_id:
              type: string
            source_bind_host:
              type: string
            source_bind_port:
              type: integer
              minimum: 0
              maximum: 65535
            target_host:
              type: string
            target_port:
              type: integer
              minimum: 1
              maximum: 65535
            protocol:
              type: string
              enum: [tcp]
            purpose:
              type: string
        status:
          type: object
          additionalProperties: false
          required: [state, source_connected, target_connected, source_url, last_error]
          properties:
            state:
              type: string
              enum: [starting, waiting_for_worker, ready, closed, failed]
            source_connected:
              type: boolean
            target_connected:
              type: boolean
            source_url:
              type: string
            last_error:
              type: [string, "null"]
    Workbench:
