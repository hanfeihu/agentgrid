components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^job_[A-Za-z0-9_\\-]+$"
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    NodeId:
      name: node_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PortBridgeId:
      name: port_bridge_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^pbridge_[A-Za-z0-9_\\-]+$"
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^task_[A-Za-z0-9_\\-]+$"
    ToolId:
      name: tool_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z0-9][A-Za-z0-9_.:\\-]*$"
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    WorkbenchId:
      name: workbench_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    AgentTask:
      $ref: "../../schemas/agent-task.schema.json"
    AgentTaskResult:
      $ref: "../../schemas/agent-task-result.schema.json"
    ApiError:
      $ref: "../../schemas/api-error.schema.json"
    PlacementContract:
      $ref: "../../schemas/placement-contract.schema.json"
    Artifact:
      type: object
      additionalProperties: false
      required: [id, type, created_at]
      properties:
        id:
          type: string
          minLength: 1
        type:
          type: string
          enum: [screenshot, stdout_log, stderr_log, serial_log, file_artifact, test_report, operation_timeline, json, other]
        task_id:
          type: [string, "null"]
          pattern: "^task_[A-Za-z0-9_\\-]+$"
        job_id:
          type: [string, "null"]
          pattern: "^job_[A-Za-z0-9_\\-]+$"
        node_id:
          type: [string, "null"]
        name:
          type: [string, "null"]
        content_type:
          type: [string, "null"]
        size_bytes:
          type: [integer, "null"]
          minimum: 0
        sha256:
          type: [string, "null"]
          pattern: "^[a-fA-F0-9]{64}$"
        download_url:
          type: [string, "null"]
          format: uri
        created_at:
          type: string
          format: date-time
    AuthResponse:
      type: object
      additionalProperties: false
      required: [ok, token, user]
      properties:
        ok:
          const: true
        token:
          type: string
          minLength: 1
        user:
          $ref: "#/components/schemas/User"
        organization:
          $ref: "#/components/schemas/Organization"
    WorkerUpdateManifest:
      type: object
      additionalProperties: true
      required:
        - ok
        - service
        - version
        - target
        - sha256
        - size_bytes
        - download_url
        - update_available
        - compatible
        - signature_algorithm
        - signature_required
      properties:
        ok:
          const: true
        service:
          const: agentgrid-worker-update
        version:
          type: string
        target:
          type: string
        sha256:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"
        size_bytes:
          type: integer
          minimum: 0
        download_url:
          type: string
        update_available:
          type: boolean
        compatible:
          type: boolean
        compatibility:
          type: object
          additionalProperties: true
        signature_algorithm:
          type: string
          enum: [none, ed25519]
        signature:
          type: [string, "null"]
          description: Base64 Ed25519 signature over the raw Worker binary bytes.
        signing_key_id:
          type: [string, "null"]
        signing_public_key:
          type: [string, "null"]
          description: Optional base64 Ed25519 public key. Production Workers should prefer locally pinned public keys.
        signature_required:
          type: boolean
        signing:
          type: object
          additionalProperties: true
          properties:
            algorithm:
              type: string
              enum: [none, ed25519]
            key_id:
              type: [string, "null"]
            public_key:
              type: [string, "null"]
            signature:
              type: [string, "null"]
            required:
              type: boolean
            verified_by_hub:
              type: boolean
            signed_payload:
              type: string
        published_at:
          type: string
          format: date-time
    CheckpointPolicy:
      type: object
      additionalProperties: true
      properties:
        enabled:
          type: boolean
          default: false
        mode:
          type: string
          enum: [none, worker_reported, client_reported]
          default: none
    CreateJobRequest:
      type: object
      additionalProperties: false
      required: [title, tool_id, payload]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        tool_id:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9_.:\\-]*$"
        payload:
          $ref: "#/components/schemas/JsonValue"
        placement:
          type: [object, "null"]
          additionalProperties: true
        strategy:
          $ref: "#/components/schemas/JobStrategy"
        partition:
          $ref: "#/components/schemas/JobPartition"
        reduce:
          $ref: "#/components/schemas/JobReduce"
        retry_policy:
          $ref: "#/components/schemas/RetryPolicy"
        checkpoint_policy:
          $ref: "#/components/schemas/CheckpointPolicy"
        idempotency:
          $ref: "#/components/schemas/Idempotency"
    CreateNodeProvisioningPlanRequest:
      type: object
      additionalProperties: true
      required: [node_id, node_name, os, arch]
      properties:
        node_id:
          type: string
          minLength: 1
        node_name:
          type: string
          minLength: 1
        ssh_host:
          type: string
        ssh_user:
          type: string
        os:
          type: string
        arch:
          type: string
        hub_url:
          type: string
        join_token:
          type: string
          description: Optional caller-provided join token. Hub may generate one when omitted.
    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [title, summary]
      properties:
        project_id:
          type: string
          default: agentgrid
        created_by:
          type: string
          minLength: 1
        assigned_to:
          type: array
          items:
            type: string
            minLength: 1
          uniqueItems: true
          default: []
        title:
          type: string
          minLength: 1
          maxLength: 200
        summary:
          type: string
          minLength: 1
        owner:
          type: [string, "null"]
        priority:
          $ref: "#/components/schemas/Priority"
        tool_id:
          type: [string, "null"]
          pattern: "^[A-Za-z0-9][A-Za-z0-9_.:\\-]*$"
        payload:
          $ref: "#/components/schemas/JsonValue"
        placement:
          type: [object, "null"]
          additionalProperties: true
        inputs:
          type: array
          items:
            type: string
          default: []
        outputs:
          type: array
          items:
            type: string
          default: []
        acceptance_criteria:
          type: array
          items:
            type: string
          default: []
        labels:
          type: array
          items:
            type: string
          uniqueItems: true
          default: []
        depends_on:
          type: array
          items:
            type: string
            pattern: "^task_[A-Za-z0-9_\\-]+$"
          uniqueItems: true
          default: []
        due_at:
          type: [string, "null"]
          format: date-time
        requires_ack:
          type: boolean
          default: false
        correlation_id:
          type: [string, "null"]
    Event:
      type: object
      additionalProperties: true
      required: [id, type, created_at]
      properties:
        id:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        subject_id:
          type: [string, "null"]
        source:
          type: [string, "null"]
        payload:
          $ref: "#/components/schemas/JsonValue"
        created_at:
          type: string
          format: date-time
    EventIngressRequest:
      type: object
      additionalProperties: false
      required: [source, type, payload]
      properties:
        source:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        target:
          type: object
          additionalProperties: true
          properties:
            job_id:
              type: string
              pattern: "^job_[A-Za-z0-9_\\-]+$"
            task_id:
              type: string
              pattern: "^task_[A-Za-z0-9_\\-]+$"
            node_id:
              type: string
        idempotency_key:
          type: [string, "null"]
        payload:
          $ref: "#/components/schemas/JsonValue"
        ttl_seconds:
          type: [integer, "null"]
          minimum: 1
    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok, service, time]
      properties:
        ok:
          const: true
        service:
          type: string
          examples: [agentgrid-hub]
        version:
          type: string
        time:
          type: string
          format: date-time
    Idempotency:
      type: object
      additionalProperties: false
      properties:
        key:
          type: [string, "null"]
        mode:
          type: string
          enum: [at_least_once, idempotent, external_exactly_once]
          default: at_least_once
    Job:
      type: object
      additionalProperties: true
      required: [api_version, kind, metadata, spec, status]
      properties:
        api_version:
          const: agentgrid.job/v1
        kind:
          const: Job
        metadata:
          type: object
          additionalProperties: true
          required: [id, created_at, updated_at]
          properties:
            id:
              type: string
              pattern: "^job_[A-Za-z0-9_\\-]+$"
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        spec:
          $ref: "#/components/schemas/CreateJobRequest"
        status:
          type: object
          additionalProperties: true
          required: [state]
          properties:
            state:
              $ref: "#/components/schemas/JobState"
            result:
              $ref: "#/components/schemas/JsonValue"
    JobExecutionView:
      type: object
      additionalProperties: true
      required: [api_version, kind, job_id, summary, recovery, timeline, attempts, checkpoints, events]
      properties:
        api_version:
          const: agentgrid.job-execution/v1
        kind:
          const: JobExecutionView
        job_id:
          type: string
          pattern: "^job_[A-Za-z0-9_\\-]+$"
        summary:
          type: object
          additionalProperties: true
        recovery:
          type: object
          additionalProperties: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        attempts:
          type: array
          items:
            type: object
            additionalProperties: true
        checkpoints:
          type: array
          items:
            type: object
            additionalProperties: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
    JobPartition:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type]
          properties:
            type:
              const: none
        - type: object
          additionalProperties: false
          required: [type, items]
          properties:
            type:
              const: items
            items:
              type: array
              items:
                $ref: "#/components/schemas/JsonValue"
        - type: object
          additionalProperties: false
          required: [type, start, end, step]
          properties:
