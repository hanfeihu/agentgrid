        password:
          type: string
          minLength: 1
    Node:
      type: object
      additionalProperties: true
      required: [id, status]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
        os:
          type: string
        status:
          type: string
          enum: [online, offline, unknown]
        auth_status:
          type: string
          enum: [pending, bound, legacy]
        capabilities:
          type: array
          items:
            type: string
